# 网站基本信息
title: My notes
description: >-
  Programming and Experiments for Bioinformatics
url: "https://ElectrophoresisZ.github.io"
baseurl: ""  # 保持为空，适合根域名

# 主题配置
remote_theme: pages-themes/cayman@v0.2.0
# 自定义配色（覆盖 Cayman 默认绿色）
cayman:
  colors:
    background: "#f6f8fa"  # 浅灰背景，柔和且专业
    header: "linear-gradient(135deg, #2b5797, #1b3a6b)"  # 深蓝渐变，科研感
    link: "#005b96"  # 链接蓝色，清晰高亮
    link-hover: "#003087"  # 悬停深蓝，增加交互
    code: "#f8f9fa"  # 代码背景浅灰
    code-text: "#333"  # 代码文字深灰
  font-family: "'Roboto', -apple-system, BlinkMacSystemFont, sans-serif"  # 现代字体

# 导航菜单（更清晰，添加分类页面）
header_pages:
  - index.md
  - programming.md
  - math.md
  - tools.md

# 插件配置
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-toc  # 自动目录（GitHub Pages 默认不支持，需确认）

# Markdown 和高亮
markdown: kramdown
kramdown:
  toc_levels: 2..3  # 目录支持 h2, h3
highlighter: rouge

# 链接格式
permalink: /notes/:categories/:title/

# 分类配置
collections:
  programming:
    output: true
    permalink: /notes/programming/:title/
  math:
    output: true
    permalink: /notes/math/:title/
  tools:
    output: true
    permalink: /notes/tools/:title/

# 默认布局
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: ""
      type: programming
    values:
      layout: default
      category: Programming
  - scope:
      path: ""
      type: math
    values:
      layout: default
      category: Math
  - scope:
      path: ""
      type: tools
    values:
      layout: default
      category: Tools
